services:
  postgres:
    image: postgres:16
    container_name: apistatus_postgres
    environment:
      POSTGRES_DB: statusmonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apistatus_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  apistatus:
    image: apistatus
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apistatus_api
    ports:
      - "8080:8080"
      - "8081:8081" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=statusmonitor;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379,password=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    name: apistatus_postgres_data